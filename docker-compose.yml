services:
  # --- Apache Jena Fuseki ---
  fuseki:
    image: ${FUSEKI_IMAGE:-stain/jena-fuseki:latest}
    container_name: jena-fuseki
    ports:
      - "${FUSEKI_PORT:-3030}:3030"
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - JAVA_OPTIONS=${JAVA_OPTIONS:--Xmx2g}
    volumes:
      - ./fuseki-data:/fuseki
    restart: unless-stopped

  # --- WebProtégé ---
  webprotege:
    image: ${WEBPROTEGE_IMAGE:-protegeproject/webprotege:latest}
    container_name: webprotege
    ports:
      - "${WEBPROTEGE_PORT:-5000}:8080"
    environment:
      - webprotege.mongodb.host=wpmongo
      - webprotege.application.host=localhost
      - webprotege.application.port=${WEBPROTEGE_PORT:-5000}
      - webprotege.application.scheme=http
      - webprotege.data.directory=/data/webprotege
    depends_on:
      - wpmongo
    volumes:
      - ./webprotege-data:/data/webprotege
    restart: unless-stopped

  # --- MongoDB (Banco de dados para WebProtégé) ---
  wpmongo:
    image: ${MONGODB_IMAGE:-mongo:4.1-bionic}
    container_name: webprotege-mongo
    ports:
      - "${MONGODB_PORT:-27017}:27017"
    volumes:
      - ./mongo-data:/data/db
    restart: unless-stopped
